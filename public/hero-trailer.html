<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  /* Cover-fit crop, same math as CSS background-size:cover for a 16:9 source:
     size by whichever dimension is the tighter fit, then center and clip the
     overflow via the parent's overflow:hidden. No Android-side transform
     guessing needed — this is exact, and easy to retune (see VERTICAL_ANCHOR
     below) directly in this file. */
  #wrap {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  #player {
    position: absolute;
    left: 50%;
    top: 50%; /* vertical anchor — see comment below to bias up/down */
    width: 100vw;
    height: 56.25vw;   /* 100/16*9 */
    min-height: 100vh;
    min-width: 177.78vh; /* 100/9*16 */
    transform: translate(-50%, -50%);
  }
  #player iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
</style>
</head>
<body>
<div id="wrap"><div id="player"></div></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // ---- Read the video id from ?v=... ----
  function qs(name) {
    var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }
  var videoId = qs('v');

  // ---- Report events back to the Android WebView via the JS interface ----
  // (registered as "AndroidTrailer" — see MediaRowAdapter.kt). Guarded with
  // try/catch since this page can also be opened in a plain browser for testing.
  var reported = { playing: false, ended: false };
  function notify(name, data) {
    try {
      if (window.AndroidTrailer && window.AndroidTrailer[name]) {
        window.AndroidTrailer[name](data === undefined ? '' : String(data));
      }
    } catch (e) { /* not running inside the app — fine, just a no-op */ }
  }

  var player;

  function onYouTubeIframeAPIReady() {
    if (!videoId) { notify('onError', 'no_video_id'); return; }
    player = new YT.Player('player', {
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        mute: 0,
        controls: 0,
        modestbranding: 1,
        playsinline: 1,
        rel: 0,
        iv_load_policy: 3,
        fs: 0,
        disablekb: 1,
        cc_load_policy: 0
      },
      events: {
        onReady: function (e) {
          // The real, documented, reliable way to kill captions — operates on
          // the player's actual captions module rather than guessing at DOM
          // elements or text tracks, so it works regardless of why they were on
          // (viewer preference, uploader default, forced accessibility track).
          try { e.target.unloadModule('captions'); } catch (err) {}
          e.target.unMute();
          e.target.playVideo();
          startEndedBackupPoll();
        },
        onStateChange: function (e) {
          var st = Number(e.data);
          notify('onDebugState', 'event:' + st);
          if (st === YT.PlayerState.PLAYING) {
            if (!reported.playing) { reported.playing = true; notify('onPlaying'); }
          } else if (st === YT.PlayerState.ENDED) {
            if (!reported.ended) { reported.ended = true; notify('onEnded'); }
          }
        },
        onError: function (e) {
          notify('onError', e.data);
        }
      }
    });
  }

  // Backup for the "ended" event: the postMessage-based onStateChange callback
  // above doesn't always fire reliably (seen in testing — same class of issue as
  // the "playing" event needing a watchdog on the Android side). Poll the
  // player's actual reported state directly (more authoritative than comparing
  // currentTime to duration, which can misbehave if position resets at the end)
  // as a fallback, so the hero still advances even if that event is missed.
  //
  // Also logs every state CHANGE back to Android (not every poll tick) via
  // onDebugState — this is diagnostic: if "ended" is still missed after this,
  // the logged sequence tells us whether the player ever actually reports
  // ENDED (state 0) at all, versus getting stuck somewhere else entirely
  // (e.g. an error state that just looks similar) — real data instead of
  // another guess.
  var endedPollTimer = null;
  var lastLoggedState = null;
  function startEndedBackupPoll() {
    if (endedPollTimer) return;
    endedPollTimer = setInterval(function () {
      if (!player) return;
      try {
        var state = Number(player.getPlayerState());
        if (state !== lastLoggedState) {
          lastLoggedState = state;
          notify('onDebugState', state);
        }
        if (!reported.ended && state === YT.PlayerState.ENDED) {
          reported.ended = true;
          notify('onEnded');
        }
      } catch (e) {
        notify('onDebugState', 'poll_error:' + e);
      }
    }, 500);
  }
</script>
</body>
</html>
