<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Connect to Velix</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100dvh; background: #08080A; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card { width: 100%; max-width: 380px; }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
  p.sub { color: #A8A8B0; font-size: 15px; margin: 0 0 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab {
    flex: 1; padding: 10px; border-radius: 10px; text-align: center; font-weight: 600;
    background: #16161A; color: #A8A8B0; border: 1px solid #2A2A30; cursor: pointer;
  }
  .tab.active { background: #fff; color: #000; border-color: #fff; }
  label { display: block; font-size: 13px; color: #A8A8B0; margin: 14px 0 6px; }
  input {
    width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #2A2A30;
    background: #111114; color: #fff; font-size: 16px;
  }
  input:focus { outline: none; border-color: #fff; }
  button.primary {
    width: 100%; margin-top: 22px; padding: 15px; border-radius: 12px; border: none;
    background: #fff; color: #000; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  button.primary:disabled { opacity: 0.5; }
  .msg { margin-top: 16px; font-size: 14px; text-align: center; min-height: 20px; }
  .msg.error { color: #FF6B6B; }
  .msg.ok { color: #34C759; }
  .done { text-align: center; }
  .done .check {
    width: 72px; height: 72px; border-radius: 50%; background: #34C759;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
    font-size: 38px;
  }
  .hidden { display: none; }
  .code-pill {
    display: inline-block; margin-top: 8px; padding: 4px 12px; border-radius: 8px;
    background: #16161A; border: 1px solid #2A2A30; color: #A8A8B0;
    font-size: 13px; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
  <div class="card">
    <div id="form-view">
      <h1>Connect to Velix</h1>
      <p class="sub">Sign in or create an account to sync your profile to your TV.</p>

      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="setMode('login')">Log In</div>
        <div class="tab" id="tab-register" onclick="setMode('register')">Sign Up</div>
      </div>

      <div id="username-field" class="hidden">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" placeholder="Your name" />
      </div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

      <button class="primary" id="submit" onclick="submit()">Continue</button>
      <div class="msg" id="msg"></div>
      <div style="text-align:center"><span class="code-pill" id="codePill"></span></div>
    </div>

    <div id="done-view" class="done hidden">
      <div class="check">✓</div>
      <h1>You're all set</h1>
      <p class="sub">Your account is now connected. Head back to your TV — it'll sign in automatically.</p>
    </div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const code = (params.get('code') || '').toUpperCase();
  let mode = 'login';

  document.getElementById('codePill').textContent = code ? ('Code ' + code) : '';

  function setMode(m) {
    mode = m;
    document.getElementById('tab-login').classList.toggle('active', m === 'login');
    document.getElementById('tab-register').classList.toggle('active', m === 'register');
    document.getElementById('username-field').classList.toggle('hidden', m !== 'register');
    document.getElementById('password').setAttribute(
      'autocomplete', m === 'register' ? 'new-password' : 'current-password'
    );
    setMsg('');
  }

  function setMsg(text, kind) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (kind ? ' ' + kind : '');
  }

  async function submit() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const username = document.getElementById('username').value.trim();
    const btn = document.getElementById('submit');

    if (!code) return setMsg('Missing pairing code. Re-scan the QR on your TV.', 'error');
    if (!email || !password) return setMsg('Enter your email and password.', 'error');
    if (mode === 'register' && username.length < 2) return setMsg('Enter a username.', 'error');

    btn.disabled = true; setMsg('Connecting…');
    try {
      const path = mode === 'register' ? '/auth/register' : '/auth/login';
      const body = mode === 'register' ? { email, username, password } : { email, password };
      const authRes = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const authData = await authRes.json();
      if (!authRes.ok) {
        const map = {
          email_taken: 'That email is already registered. Try logging in.',
          bad_credentials: 'Wrong email or password.',
          weak_password: 'Password must be at least 8 characters.',
          invalid_email: 'Enter a valid email.',
        };
        throw new Error(map[authData.error] || 'Something went wrong.');
      }

      const claimRes = await fetch('/pair/claim', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + authData.token,
        },
        body: JSON.stringify({ code }),
      });
      const claimData = await claimRes.json();
      if (!claimRes.ok) {
        const map = {
          invalid_code: 'Pairing code not found. Re-scan the QR.',
          already_claimed: 'This code was already used. Re-scan the QR.',
          expired: 'The code expired. Re-scan the QR on your TV.',
        };
        throw new Error(map[claimData.error] || 'Could not connect to your TV.');
      }

      document.getElementById('form-view').classList.add('hidden');
      document.getElementById('done-view').classList.remove('hidden');
    } catch (e) {
      setMsg(e.message, 'error');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
